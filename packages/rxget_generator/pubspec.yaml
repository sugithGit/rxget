name: rxget_generator
description: Code generator for rxget GetxState classes. Eliminates boilerplate for reactive state management.
version: 1.0.0+2
homepage: https://github.com/sugithGit/get_rx
repository: https://github.com/sugithGit/get_rx
issue_tracker: https://github.com/sugithGit/get_rx/issues
topics:
  - state-management
  - rxget
  - code-generation
  - build-runner

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  analyzer: ^13.3.0
  build: ^4.0.6
  rxget_annotation: ^0.0.1
  source_gen: ^4.2.3

dev_dependencies:
  build_runner: ">=2.15.0"
  build_test: ">=3.5.15"
  source_gen_test: ">=1.3.6"
  test: ^1.31.1
