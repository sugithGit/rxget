name: rxget_generator
description: Code generator for rxget GetxState classes. Eliminates boilerplate for reactive state management.
version: 0.0.1
homepage: https://github.com/sugithGit/rxget
repository: https://github.com/sugithGit/rxget
issue_tracker: https://github.com/sugithGit/rxget/issues
topics:
  - state-management
  - rxget
  - code-generation
  - build-runner

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  analyzer: ">=7.3.0 <10.0.0"
  build: ">=2.0.0 <3.0.0"
  rxget_annotation: ^0.0.1
  source_gen: ">=2.0.0 <3.0.0"

dev_dependencies:
  build_runner: ">=2.0.0 <3.0.0"
  build_test: ">=2.0.0 <3.0.0"
  source_gen_test: ">=1.0.0 <2.0.0"
  test: ^1.21.1
